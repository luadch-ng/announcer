name: Smoke

# Build + smoke on every push and PR. Mirrors the parent
# luadch-ng/luadch repo's smoke.yml pattern.
#
# Smoke "test" here is minimal because the announcer needs a TLS
# cert + a hub to connect to before net.loop() does anything.
# What we CAN verify is the full bootstrap chain: dofile core/init.lua
# successfully loads all C extensions (socket, ssl, basexx, lfs,
# adclib) under the locally-built lua.exe + lua.dll, and fails at
# the expected point (ssl.newcontext "error loading private key" -
# no certs/serverkey.pem). Catches ABI mismatches, missing deps,
# bad CMake install paths.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Run JavaScript-based actions on Node.js 24 - matches hub's policy.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-linux:
    name: Smoke Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Install into staging tree
        run: cmake --install build

      - name: Verify install tree shape
        run: |
          test -f build/install/announcer/lua
          test -f build/install/announcer/liblua.so
          test -d build/install/announcer/core
          test -d build/install/announcer/cfg
          test -d build/install/announcer/certs
          test -d build/install/announcer/frontends
          test -f build/install/announcer/lib/adclib/adclib.so
          test -f build/install/announcer/lib/lfs/lfs.so
          test -f build/install/announcer/lib/luasec/ssl/ssl.so
          test -f build/install/announcer/lib/luasocket/socket/socket.so
          test -f build/install/announcer/lib/luasocket/mime/mime.so
          test -f build/install/announcer/lib/unicode/unicode.lua
          test -f build/install/announcer/lib/basexx/basexx.lua
          test ! -f build/install/announcer/cfg/id.lua  # secret must not be installed

      # Bootstrap-chain smoke: cd into install root, run the built lua
      # against a tiny harness that dofiles core/init.lua. Expected
      # outcome is the ssl.newcontext "error loading private key"
      # failure (certs/serverkey.pem not generated in CI) - that
      # confirms socket/ssl/basexx/lfs/adclib all required cleanly
      # AND the announcer's ADC state machine got far enough to ask
      # for the cert. Any other failure mode is a real regression.
      - name: Bootstrap-chain smoke (core/init.lua direct, fallback path)
        run: |
          cd build/install/announcer
          ./lua -e '
            local ok, err = pcall(function() dofile "core/init.lua" end)
            if not ok and err:match("error loading private key") then
              print("SMOKE OK: bootstrap chain reaches ssl.newcontext")
              os.exit(0)
            elseif ok then
              print("SMOKE OK: bootstrap chain ran clean (unexpected but not a failure)")
              os.exit(0)
            else
              io.stderr:write("SMOKE FAIL: "..tostring(err).."\n")
              os.exit(1)
            end
          '

      # Frontend bootstrap smoke (PR-D #10): exercises frontends/bootstrap.lua
      # which the direct `dofile "core/init.lua"` test above bypasses
      # entirely. Two cases:
      #   1. From install root with a relative arg[0] - hits the regex
      #      fallback path; bootstrap.lua must emit a stderr note AND
      #      the chain must still reach ssl.newcontext.
      #   2. From a foreign CWD with an absolute arg[0] - hits the
      #      anchored path; bootstrap.lua must NOT emit the fallback
      #      note (regex matched) AND the chain must reach
      #      ssl.newcontext. Without the bootstrap this case fails at
      #      the very first `dofile "core/init.lua"` with "No such
      #      file or directory".
      # Filed in #11; the direct-core test alone would have shipped a
      # bootstrap.lua regression silently.
      - name: Frontend bootstrap smoke (relative arg[0], fallback path)
        run: |
          cd build/install/announcer
          output=$(./lua frontends/cli/main.lua 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "did not anchor; assuming CWD is install root" \
            || { echo "SMOKE FAIL: expected stderr fallback note absent"; exit 1; }
          echo "$output" | grep -q "error loading private key" \
            || { echo "SMOKE FAIL: chain did not reach ssl.newcontext"; exit 1; }
          echo "SMOKE OK: fallback path emits warn + reaches ssl.newcontext"

      - name: Frontend bootstrap smoke (absolute arg[0], anchored path)
        run: |
          install_dir="$GITHUB_WORKSPACE/build/install/announcer"
          cd "$RUNNER_TEMP"
          output=$("$install_dir/lua" "$install_dir/frontends/cli/main.lua" 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "did not anchor"; then
            echo "SMOKE FAIL: anchored path unexpectedly hit the fallback warn"
            exit 1
          fi
          echo "$output" | grep -q "error loading private key" \
            || { echo "SMOKE FAIL: chain did not reach ssl.newcontext"; exit 1; }
          echo "SMOKE OK: anchored path silent + reaches ssl.newcontext"

  smoke-windows:
    name: Smoke Windows x86_64 (MinGW UCRT64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-openssl

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=/ucrt64

      - name: Build
        shell: msys2 {0}
        run: cmake --build build -j

      - name: Install into staging tree
        shell: msys2 {0}
        run: cmake --install build

      - name: Verify install tree shape
        shell: msys2 {0}
        run: |
          test -f build/install/announcer/lua.exe
          test -f build/install/announcer/lua.dll
          test -d build/install/announcer/core
          test -d build/install/announcer/cfg
          test -d build/install/announcer/certs
          test -d build/install/announcer/frontends
          test -f build/install/announcer/lib/adclib/adclib.dll
          test -f build/install/announcer/lib/lfs/lfs.dll
          test -f build/install/announcer/lib/luasec/ssl/ssl.dll
          test -f build/install/announcer/lib/luasocket/socket/socket.dll
          test -f build/install/announcer/lib/luasocket/mime/mime.dll
          test -f build/install/announcer/lib/unicode/unicode.lua
          test -f build/install/announcer/lib/basexx/basexx.lua
          test ! -f build/install/announcer/cfg/id.lua  # secret must not be installed

      - name: Bootstrap-chain smoke (core/init.lua direct, fallback path)
        shell: msys2 {0}
        run: |
          cd build/install/announcer
          ./lua.exe -e '
            local ok, err = pcall(function() dofile "core/init.lua" end)
            if not ok and err:match("error loading private key") then
              print("SMOKE OK: bootstrap chain reaches ssl.newcontext")
              os.exit(0)
            elseif ok then
              print("SMOKE OK: bootstrap chain ran clean (unexpected but not a failure)")
              os.exit(0)
            else
              io.stderr:write("SMOKE FAIL: "..tostring(err).."\n")
              os.exit(1)
            end
          '

      # See the Linux job above for rationale (PR-D #10 / follow-up #11).
      - name: Frontend bootstrap smoke (relative arg[0], fallback path)
        shell: msys2 {0}
        run: |
          cd build/install/announcer
          output=$(./lua.exe frontends/cli/main.lua 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "did not anchor; assuming CWD is install root" \
            || { echo "SMOKE FAIL: expected stderr fallback note absent"; exit 1; }
          echo "$output" | grep -q "error loading private key" \
            || { echo "SMOKE FAIL: chain did not reach ssl.newcontext"; exit 1; }
          echo "SMOKE OK: fallback path emits warn + reaches ssl.newcontext"

      - name: Frontend bootstrap smoke (absolute arg[0], anchored path)
        shell: msys2 {0}
        run: |
          install_dir="$GITHUB_WORKSPACE/build/install/announcer"
          cd "$RUNNER_TEMP"
          output=$("$install_dir/lua.exe" "$install_dir/frontends/cli/main.lua" 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "did not anchor"; then
            echo "SMOKE FAIL: anchored path unexpectedly hit the fallback warn"
            exit 1
          fi
          echo "$output" | grep -q "error loading private key" \
            || { echo "SMOKE FAIL: chain did not reach ssl.newcontext"; exit 1; }
          echo "SMOKE OK: anchored path silent + reaches ssl.newcontext"

  # ---------------------------------------------------------------------------
  # Phase 3 Tier 2d (#17): exercise the BUILD_GUI=ON path. Builds the
  # vendored wxWidgets + wxLua + wx.dll. Build-only smoke (no runtime
  # check) because the GUI process needs a real display, which the
  # headless runner doesn't have. A runtime GUI smoke would require
  # a virtual display (Xvfb on Linux, headless wxWidgets variant on
  # Windows) - out of scope for this tier.
  #
  # The job is intentionally separate from the CLI smoke jobs above:
  # different checkout (submodules: recursive), different CMake flags,
  # different verification. Default CLI smoke stays fast (~30 s) by
  # NOT triggering the wxWidgets build.
  #
  # Linux is added by Tier 2c. This tier covers Windows only.
  # ---------------------------------------------------------------------------
  gui-build-windows:
    name: GUI Build Windows x86_64 (MinGW UCRT64, BUILD_GUI=ON)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-openssl

      - name: Configure (BUILD_GUI=ON)
        shell: msys2 {0}
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=/ucrt64 -DBUILD_GUI=ON

      - name: Build (full)
        shell: msys2 {0}
        # -j 2 (not -j): the wxWidgets C++ compile is RAM-heavy (each g++
        # instance can use 1-2 GB on the larger wxcore translation units);
        # unrestricted parallelism OOMs the 16 GB Windows runner. Two
        # parallel jobs leaves headroom for the linker too.
        run: cmake --build build -j 2

      - name: Install
        shell: msys2 {0}
        run: cmake --install build

      - name: Verify GUI install-tree shape
        shell: msys2 {0}
        run: |
          test -f build/install/announcer/lib/wx/wx.dll
          # Bundled wxWidgets shared libs (Tier 2b install rules)
          ls build/install/announcer/wxbase32u_*.dll
          ls build/install/announcer/wxmsw32u_core_*.dll
          ls build/install/announcer/wxmsw32u_adv_*.dll
          ls build/install/announcer/wxmsw32u_html_*.dll
          # MinGW C/C++ runtime DLLs (without these wx.dll cannot load
          # outside of a MinGW PATH).
          test -f build/install/announcer/libgcc_s_seh-1.dll
          test -f build/install/announcer/libstdc++-6.dll
          test -f build/install/announcer/libwinpthread-1.dll
          echo "GUI install-tree shape OK"

      # Load-only smoke: spin up our bundled lua.exe and require "wx".
      # If wx.dll loads + initialises wx.wxVERSION_STRING resolves, we
      # know the entire dependency chain (lua.dll + wxbase + wxcore +
      # wxhtml + wxnet + MinGW runtime) loads correctly on a fresh
      # runner. We deliberately do NOT construct a wxFrame because
      # that needs a real display.
      - name: Require-wx smoke (load chain only, no window)
        shell: msys2 {0}
        run: |
          cd build/install/announcer
          output=$(./lua.exe -e 'package.cpath = package.cpath .. [[;././lib/?/?.dll]]; local ok, m = pcall(require, "wx"); if not ok then io.stderr:write("FAIL: "..tostring(m).."\n"); os.exit(1) end; print("SMOKE OK: require wx OK, wx.wxVERSION_STRING = " .. tostring(m.wxVERSION_STRING))' 2>&1)
          echo "$output"
          echo "$output" | grep -q "SMOKE OK" \
            || { echo "GUI BUILD SMOKE FAIL"; exit 1; }
